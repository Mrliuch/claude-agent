<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>claude-agent · 登录</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: radial-gradient(1200px 800px at 50% -10%, #1b2230 0%, #0c0f16 60%, #080a10 100%);
    color: #e6e9ef;
  }
  .card {
    width: min(92vw, 380px); padding: 32px 28px; border-radius: 16px;
    background: rgba(22, 27, 38, 0.9); border: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 20px 60px rgba(0,0,0,0.45);
  }
  h1 { margin: 0 0 4px; font-size: 18px; letter-spacing: .5px; }
  p.sub { margin: 0 0 22px; font-size: 12.5px; color: #8b93a7; }
  label { display: block; font-size: 12px; color: #9aa3b6; margin: 0 0 6px; }
  input {
    width: 100%; padding: 11px 13px; border-radius: 10px; font-size: 14px;
    background: #0e131c; border: 1px solid rgba(255,255,255,0.1); color: #e6e9ef; outline: none;
  }
  input:focus { border-color: #4c8dff; }
  button {
    width: 100%; margin-top: 18px; padding: 11px; border: 0; border-radius: 10px; cursor: pointer;
    font-size: 14px; font-weight: 600; color: #fff;
    background: linear-gradient(180deg, #4c8dff, #2f6fe0);
  }
  button:disabled { opacity: .6; cursor: default; }
  .err { margin-top: 14px; font-size: 12.5px; color: #ff8080; min-height: 16px; }
</style>
</head>
<body>
  <form class="card" id="f">
    <h1>claude-agent</h1>
    <p class="sub">请输入 AGENT_TOKEN 以访问控制台</p>
    <label for="tok">令牌 / token</label>
    <input id="tok" type="password" autocomplete="current-password" placeholder="AGENT_TOKEN" autofocus />
    <button id="btn" type="submit">进入</button>
    <div class="err" id="err"></div>
  </form>
<script>
  const f = document.getElementById("f"), tok = document.getElementById("tok"),
        btn = document.getElementById("btn"), err = document.getElementById("err");
  f.addEventListener("submit", async (e) => {
    e.preventDefault();
    const t = tok.value.trim();
    if (!t) { err.textContent = "请输入 token"; return; }
    btn.disabled = true; err.textContent = "";
    try {
      const r = await fetch("/agent/login?token=" + encodeURIComponent(t), { method: "POST" });
      const j = await r.json();
      if (j.code === 0) {
        // 同时存入 localStorage,供控制台的 WS/API 调用复用同一 token。
        try { localStorage.setItem("agent.token", t); } catch (_) {}
        location.replace("/");
      } else {
        err.textContent = j.msg || "认证失败"; btn.disabled = false;
      }
    } catch (_) {
      err.textContent = "网络错误"; btn.disabled = false;
    }
  });
</script>
</body>
</html>
